id: shader-audio
name: Audio Reactivity Injector
description: Adds frequency-reactive animations to static shaders
role: Audio-Reactive Shader Engineer

context:
  repository: github.com/ford442/mod-player
  requires_files:
    - "src/shaders/{{design_name}}_chassis.wgsl"
    - "src/shaders/audio_common.wgsl"
  outputs_to: src/shaders/{{design_name}}_chassis.wgsl

variables:
  design_name:
    type: string
  
  reactivity_mapping:
    type: object
    default:
      bass: "outer rings (emission intensity)"
      mids: "middle rings (color shift warm)"
      highs: "inner rings (segment pulsing)"
  
  color_palette:
    type: object
    properties:
      low_energy: "cool blue #00aaff"
      high_energy: "vibrant purple #ff00ff"
  
  animation_style:
    type: string
    enum: [smooth, punchy, ambient, strobe]
    default: smooth

prompt_template: |
  You are a coding agent working on the mod-player project at {{repository}}.
  
  Update 'src/shaders/{{design_name}}_chassis.wgsl' to add audio reactivity.
  
  Existing uniforms available:
  - audio.bands[4] (low, lowMid, highMid, high)
  - audio.amplitude (overall volume 0.0-1.0)
  - audio.beat (impulse on beat detection)
  
  Implement:
  {{#each reactivity_mapping}}
  - {{@key}} frequencies → {{this}}
  {{/each}}
  
  Color dynamics:
  - Low energy: {{color_palette.low_energy}}
  - High energy: {{color_palette.high_energy}}
  - Smooth interpolation between states
  
  Animation style: {{animation_style}}
  - Emission intensity modulation (0.5x to 2.0x base)
  - Subtle segment pulsing (phase offset by ring index)
  - Maintain premium aesthetic (no chaotic flickering)
  
  Constraints:
  - Preserve all static geometry and materials
  - Add uniform bindings if missing
  - Use existing audio buffer layout
  
  Output: Complete updated WGSL source code only
