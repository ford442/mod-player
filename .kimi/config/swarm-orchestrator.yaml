workflow:
  name: parallel-chassis-pipeline
  version: 2.0.0
  
  # Parallel group definition
  parallel_groups:
    - name: component-specs
      tasks:
        - id: 001a
          task_file: tasks/001a-panel-spec.md
          timeout: 120s
        - id: 001b  
          task_file: tasks/001b-knobs-spec.md
          timeout: 120s
        - id: 001c
          task_file: tasks/001c-rings-spec.md
          timeout: 120s
      
  # Sequential chain with dependencies
  sequential_chain:
    - id: 001d
      task_file: tasks/001d-merge-specs.md
      depends_on: [001a, 001b, 001c]
      condition: all_completed
      
    - id: 002
      task_file: tasks/002-shader-gen.md
      depends_on: [001d]
      
    - id: 003
      task_file: tasks/003-audio-reactive.md
      depends_on: [002]
      
    - id: 004
      task_file: tasks/004-frontend-integrate.md
      depends_on: [003]

execution_strategy:
  # Phase 1: Run parallel group
  - phase: 1
    type: parallel
    group: component-specs
    
  # Phase 2: Sequential dependency chain  
  - phase: 2
    type: sequential
    tasks: [001d, 002, 003, 004]
